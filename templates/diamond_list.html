{% if error %}
<div class="alert alert-error">
    <strong>Error:</strong> {{ error }}
</div>
{% endif %}

{% for diamond in diamonds %}
<div class="diamond-list-item card mb-2">
    <div class="card-body py-2">
        <div class="d-flex align-items-center gap-2">
            <div class="diamond-list-item-main flex-grow-1" onclick="editDiamond({{ diamond.id }})" role="button" tabindex="0" title="Click to edit">
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <div class="diamond-list-color" style="background-color: {{ diamond.color }};"></div>
                    <span class="diamond-list-label fw-semibold">{{ diamond.label }}</span>
                    {% if diamond.notes %}
                    <span class="text-muted small">{{ diamond.notes }}</span>
                    {% endif %}
                </div>
                <p class="diamond-list-meta text-muted mb-0 mt-1 small">Created: {{ diamond.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
            </div>
            <div class="diamond-list-actions d-flex gap-1">
                <button type="button" onclick="event.stopPropagation(); toggleDiamondVisibility({{ diamond.id }}, this);" class="btn btn-outline-secondary btn-sm diamond-list-btn" title="Hide from graph">
                    <i class="mdi mdi-eye" aria-hidden="true"></i>
                </button>
                <button type="button" onclick="event.stopPropagation(); viewDiamondDetails({{ diamond.id }});" class="btn btn-outline-secondary btn-sm diamond-list-btn" title="View / Pop out">
                    <i class="mdi mdi-open-in-new" aria-hidden="true"></i>
                </button>
                <button type="button" onclick="event.stopPropagation(); deleteDiamond({{ diamond.id }});" class="btn btn-outline-danger btn-sm diamond-list-btn" title="Delete">
                    <i class="mdi mdi-close" aria-hidden="true"></i>
                </button>
            </div>
        </div>
    </div>
</div>
{% else %}
<p class="text-muted small mb-0">No diamonds created yet. Create your first diamond above!</p>
{% endfor %}
