{% extends "base.html" %}
{% block title %}About – Diamond Modeller{% endblock %}
{% block body_class %}{% endblock %}

{% block content %}
<div class="container-fluid p-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10 col-xl-8">
      <div class="card">
        <div class="card-body p-4 about-readme">
          {{ readme_html | safe }}
        </div>
      </div>
    </div>
  </div>
</div>
<style>
  .about-readme h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
  .about-readme h2 { font-size: 1.35rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
  .about-readme h3 { font-size: 1.15rem; margin-top: 1rem; margin-bottom: 0.35rem; }
  .about-readme pre { background: #f5f5f5; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
  body.dark-mode .about-readme pre { background: #2d2d32; }
  .about-readme code { font-size: 0.9em; }
  .about-readme ul, .about-readme ol { padding-left: 1.5rem; }
  .about-readme p { margin-bottom: 0.75rem; }
</style>
{% endblock %}
